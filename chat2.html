<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WisdomPen — Islamic Knowledge Chat</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0f;
            --bg-elevated: #141419;
            --bg-input: #1a1a21;
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.14);
            --text: #ececf1;
            --text-secondary: #a3a3ad;
            --text-tertiary: #6e6e78;
            --accent: #10a37f;
            --accent-soft: rgba(16, 163, 127, 0.12);
            --user-bubble: #1f3a33;
            --warn: #ffb454;
            --radius: 16px;
            --content-width: 768px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        /* ---------- Header ---------- */
        header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 20px;
            padding-top: max(12px, env(safe-area-inset-top));
            background: rgba(11, 11, 15, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .header-left,
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .header-right {
            justify-content: flex-end;
        }

        .header-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.25;
        }

        .header-title h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .header-title span {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-tertiary);
        }

        .pill-btn {
            padding: 7px 14px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .pill-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        #request-counter {
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* ---------- Chat scroll area ---------- */
        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }

        .chat-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .chat-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px;
        }

        .chat-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        .chat-messages {
            list-style: none;
            max-width: var(--content-width);
            margin: 0 auto;
            padding: 28px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chat-messages li {
            animation: messageIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------- User message: compact bubble, right aligned ---------- */
        .user-message {
            display: flex;
            justify-content: flex-end;
        }

        .user-message .message-content {
            max-width: 78%;
            background: var(--user-bubble);
            border: 1px solid rgba(16, 163, 127, 0.25);
            border-radius: var(--radius);
            border-bottom-right-radius: 6px;
            padding: 12px 16px;
            font-size: 15.5px;
            line-height: 1.6;
            color: var(--text);
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }

        /* ---------- Assistant message: open layout with label ---------- */
        .assistant-message .sender-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.01em;
        }

        .assistant-message .sender-label::before {
            content: "";
            width: 22px;
            height: 22px;
            border-radius: 7px;
            background: var(--accent-soft) url('logo.png') center/70% no-repeat;
            border: 1px solid rgba(16, 163, 127, 0.3);
        }

        .assistant-message .message-content {
            font-size: 16px;
            line-height: 1.75;
            color: var(--text);
            overflow-wrap: break-word;
            padding-left: 30px;
        }

        /* ---------- Formatted AI output ---------- */
        .message-text h1,
        .message-text h2,
        .message-text h3 {
            font-weight: 650;
            letter-spacing: -0.01em;
            color: #fff;
            margin: 1.4em 0 0.5em;
            line-height: 1.35;
        }

        .message-text h1 {
            font-size: 1.25em;
        }

        .message-text h2 {
            font-size: 1.15em;
        }

        .message-text h3 {
            font-size: 1.05em;
            color: #c9ece1;
        }

        .message-text> :first-child {
            margin-top: 0;
        }

        .message-text> :last-child {
            margin-bottom: 0;
        }

        .message-text p {
            margin: 0 0 0.9em;
        }

        .message-text strong {
            font-weight: 650;
            color: #fff;
        }

        .message-text em {
            color: #cfd8dc;
        }

        .message-text ul,
        .message-text ol {
            margin: 0.4em 0 1em;
            padding-left: 1.4em;
        }

        .message-text li {
            margin: 0.35em 0;
            padding-left: 0.2em;
            animation: none;
        }

        .message-text ul li::marker {
            color: var(--accent);
        }

        .message-text ol li::marker {
            color: var(--accent);
            font-weight: 600;
        }

        .message-text blockquote {
            margin: 1em 0;
            padding: 10px 16px;
            border-left: 3px solid var(--accent);
            background: rgba(16, 163, 127, 0.06);
            border-radius: 0 10px 10px 0;
            color: #d6e9e2;
        }

        .message-text blockquote p {
            margin: 0;
        }

        .message-text .reference {
            display: inline;
            font-style: italic;
            color: #9fd4c4;
            font-size: 0.95em;
        }

        .message-text .important-paragraph {
            background: rgba(255, 180, 84, 0.06);
            border-left: 3px solid var(--warn);
            border-radius: 0 10px 10px 0;
            padding: 10px 16px;
            margin: 1em 0;
        }

        .message-text hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.4em 0;
        }

        .message-text code {
            font-family: 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
            font-size: 0.88em;
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 6px;
        }

        .message-text pre {
            background: #111116;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            overflow-x: auto;
            margin: 1em 0;
        }

        .message-text pre code {
            background: none;
            padding: 0;
        }

        .message-text a {
            color: var(--accent);
            text-decoration: none;
        }

        .message-text a:hover {
            text-decoration: underline;
        }

        /* Arabic support */
        .rtl .message-text,
        .message-text[dir="rtl"] {
            direction: rtl;
            text-align: right;
        }

        /* ---------- Image / file previews inside messages ---------- */
        .message-file-previews {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .message-image-container {
            max-width: 220px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-strong);
        }

        .message-image-preview {
            width: 100%;
            height: auto;
            display: block;
        }

        .message-file-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
        }

        .message-file-info .material-icons-round {
            font-size: 18px;
            color: var(--accent);
        }

        /* ---------- Composer ---------- */
        .composer-wrap {
            flex-shrink: 0;
            padding: 10px 20px calc(14px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 70%, transparent);
            position: relative;
        }

        .composer {
            max-width: var(--content-width);
            margin: 0 auto;
            position: relative;
        }

        .composer-box {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-strong);
            border-radius: 22px;
            padding: 8px 8px 8px 18px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .composer-box:focus-within {
            border-color: rgba(16, 163, 127, 0.5);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.12);
        }

        .user-input {
            flex: 1;
            min-height: 26px;
            max-height: 160px;
            padding: 6px 0;
            font-size: 16px;
            line-height: 1.5;
            background: transparent;
            border: none;
            color: var(--text);
            outline: none;
            resize: none;
            font-family: inherit;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        .user-input::placeholder {
            color: var(--text-tertiary);
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.15s ease;
            background: transparent;
            color: var(--text-secondary);
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        .send {
            background: var(--accent);
            color: #fff;
        }

        .send:hover {
            background: #0e8f70;
            color: #fff;
        }

        .send:active {
            transform: scale(0.94);
        }

        .send:disabled {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        .send .material-icons-round {
            font-size: 20px;
        }

        .file-upload-label {
            position: relative;
        }

        .file-upload-label .material-icons-round {
            font-size: 22px;
        }

        .composer-hint {
            text-align: center;
            font-size: 11.5px;
            color: var(--text-tertiary);
            margin-top: 8px;
        }

        /* ---------- Pending file chips above composer ---------- */
        .file-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-width: var(--content-width);
            margin: 0 auto 10px;
        }

        .file-list:empty {
            display: none;
        }

        .file-item {
            display: flex;
            flex-direction: column;
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            border-radius: 14px;
            padding: 10px;
            font-size: 13px;
            max-width: 220px;
            animation: messageIn 0.25s ease;
        }

        .file-item-header {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .file-item .material-icons-round {
            font-size: 17px;
            color: var(--accent);
        }

        .file-item .file-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            font-weight: 500;
        }

        .file-status {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .remove-file {
            cursor: pointer;
            color: var(--text-tertiary);
            border-radius: 50%;
            padding: 2px;
            transition: all 0.15s ease;
        }

        .remove-file:hover {
            color: #ff5d5d;
            background: rgba(255, 93, 93, 0.12);
        }

        .file-preview-container {
            margin-top: 8px;
        }

        .file-preview {
            max-width: 180px;
            max-height: 110px;
            border-radius: 8px;
            object-fit: cover;
            display: block;
        }

        /* ---------- Scroll to bottom button ---------- */
        .scroll-bottom {
            position: absolute;
            top: -52px;
            left: 50%;
            transform: translateX(-50%);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border-strong);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            z-index: 50;
        }

        .scroll-bottom.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .scroll-bottom:hover {
            color: var(--text);
        }

        /* ---------- Loading animation ---------- */
        .wisdom-pen-loading {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 0;
        }

        .ink-drops {
            display: flex;
            gap: 5px;
        }

        .ink-drop {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out;
        }

        .ink-drop:nth-child(2) {
            animation-delay: 0.18s;
        }

        .ink-drop:nth-child(3) {
            animation-delay: 0.36s;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.25;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.15);
            }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* ---------- Sources sidebar ---------- */
        .sidebar {
            position: fixed;
            right: -340px;
            top: 0;
            width: 320px;
            height: 100dvh;
            background: rgba(20, 20, 25, 0.97);
            backdrop-filter: blur(16px);
            transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1001;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .close-sidebar {
            position: absolute;
            right: 16px;
            top: 16px;
            cursor: pointer;
            color: var(--text-secondary);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.15s ease;
        }

        .close-sidebar:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        #sources-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        #sources-list li {
            padding: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            margin-bottom: 10px;
            border-radius: 10px;
            font-size: 14px;
        }

        /* ---------- Highlight-to-ask tooltip ---------- */
        .selection-tooltip {
            position: fixed;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            border-radius: 999px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
            z-index: 1100;
            opacity: 0;
            transform: translateY(4px);
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
            white-space: nowrap;
        }

        .selection-tooltip.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .selection-tooltip:hover {
            border-color: rgba(16, 163, 127, 0.5);
            color: #fff;
        }

        .selection-tooltip .material-icons-round {
            font-size: 16px;
            color: var(--accent);
        }

        /* ---------- Quote attached to composer ---------- */
        .quote-bar {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: var(--content-width);
            margin: 0 auto 8px;
            padding: 10px 12px 10px 14px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            border-left: 3px solid var(--accent);
            border-radius: 12px;
            animation: messageIn 0.2s ease;
        }

        .quote-bar[hidden] {
            display: none;
        }

        .quote-bar-body {
            flex: 1;
            min-width: 0;
        }

        .quote-bar-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 3px;
        }

        .quote-bar-text {
            font-size: 13.5px;
            line-height: 1.5;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .quote-bar .remove-quote {
            flex-shrink: 0;
            cursor: pointer;
            color: var(--text-tertiary);
            border-radius: 50%;
            padding: 3px;
            transition: all 0.15s ease;
        }

        .quote-bar .remove-quote:hover {
            color: #ff5d5d;
            background: rgba(255, 93, 93, 0.12);
        }

        .quote-bar .remove-quote .material-icons-round {
            font-size: 17px;
            display: block;
        }

        /* Quoted text shown inside user bubble */
        .user-message .quoted-text {
            border-left: 3px solid rgba(16, 163, 127, 0.6);
            background: rgba(0, 0, 0, 0.22);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 8px;
            font-size: 13.5px;
            line-height: 1.5;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Make assistant text selectable with accent highlight */
        .assistant-message .message-text::selection,
        .assistant-message .message-text *::selection {
            background: rgba(16, 163, 127, 0.35);
            color: #fff;
        }

        /* ---------- Mobile ---------- */
        @media only screen and (max-width: 640px) {
            header {
                padding: 10px 14px;
                padding-top: max(10px, env(safe-area-inset-top));
            }

            .header-title h1 {
                font-size: 14px;
            }

            #request-counter {
                font-size: 10.5px;
                padding: 5px 9px;
            }

            .pill-btn {
                padding: 6px 11px;
                font-size: 12px;
            }

            .chat-messages {
                padding: 20px 14px 24px;
                gap: 20px;
            }

            .user-message .message-content {
                max-width: 88%;
                font-size: 15px;
            }

            .assistant-message .message-content {
                font-size: 15.5px;
                padding-left: 0;
            }

            .composer-wrap {
                padding: 8px 12px calc(10px + env(safe-area-inset-bottom));
            }

            .composer-hint {
                display: none;
            }

            .sidebar {
                width: 100%;
                right: -100%;
            }
        }
    </style>
    <script>
        // Replay-gate: redirect through the intro animation once per session
        if (!sessionStorage.getItem('animationPlayed')) {
            window.location.href = 'animation.html';
        } else {
            sessionStorage.removeItem('animationPlayed');
        }
    </script>
</head>

<body>
    <header id="header">
        <div class="header-left">
            <button id="languageToggle" class="pill-btn">عربي</button>
        </div>
        <div class="header-title">
            <h1>WisdomPen</h1>
            <span class="test">Beta 0.8.0</span>
        </div>
        <div class="header-right">
            <div id="request-counter">28 requests left</div>
            <a id="Report" class="pill-btn" href="https://forms.gle/oNUpVPp7xvdY8JvM9" target="_blank">Report bug</a>
        </div>
    </header>

    <main class="chat-scroll" id="chat-container">
        <ul class="chat-messages" id="chat-messages"></ul>
    </main>

    <div class="composer-wrap" id="overlaybox">
        <button class="scroll-bottom" id="scroll-bottom" aria-label="Scroll to bottom">
            <span class="material-icons-round">arrow_downward</span>
        </button>
        <div class="composer">
            <div class="file-list" id="file-list"></div>
            <div class="quote-bar" id="quote-bar" hidden>
                <div class="quote-bar-body">
                    <div class="quote-bar-label">Asking about</div>
                    <div class="quote-bar-text" id="quote-bar-text"></div>
                </div>
                <span class="remove-quote" id="remove-quote" title="Remove quote">
                    <span class="material-icons-round">close</span>
                </span>
            </div>
            <div class="composer-box" id="overlaychat">
                <textarea class="user-input" id="user-input" rows="1" placeholder="Ask an Islamic question"></textarea>
                <label for="file-upload" class="icon-btn file-upload-label" title="Attach image or text file">
                    <span class="material-icons-round">add_photo_alternate</span>
                </label>
                <input type="file" id="file-upload" accept=".txt,image/*" style="display: none;">
                <button class="icon-btn send" id="send" aria-label="Send message">
                    <span class="material-icons-round">arrow_upward</span>
                </button>
            </div>
            <div class="composer-hint">WisdomPen can make mistakes. Verify important rulings with a scholar.</div>
        </div>
    </div>

    <button class="selection-tooltip" id="selection-tooltip">
        <span class="material-icons-round">format_quote</span>Ask about this
    </button>

    <!-- Sidebar for displaying sources -->
    <div class="sidebar" id="sources-sidebar">
        <span class="close-sidebar" id="close-sidebar"><span class="material-icons-round">close</span></span>
        <h3>Sources</h3>
        <ul id="sources-list"></ul>
    </div>

    <script>
        const chatScroll = document.getElementById('chat-container');
        const chatbox = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send');
        const fileUpload = document.getElementById('file-upload');
        const fileList = document.getElementById('file-list');
        const overlaychat = document.getElementById('overlaychat');
        const sidebar = document.getElementById('sources-sidebar');
        const sourcesList = document.getElementById('sources-list');
        const closeSidebar = document.getElementById('close-sidebar');
        const scrollBottomBtn = document.getElementById('scroll-bottom');
        const selectionTooltip = document.getElementById('selection-tooltip');
        const quoteBar = document.getElementById('quote-bar');
        const quoteBarText = document.getElementById('quote-bar-text');
        const removeQuoteBtn = document.getElementById('remove-quote');

        let quotedText = null;
        let uploadedFiles = [];
        let fileContents = [];
        let isArabic = false;
        let sessionId = null;

        const DAILY_REQUEST_LIMIT = 28;
        const REQUEST_RESET_KEY = 'requestResetTime';
        const REQUEST_COUNT_KEY = 'requestCount';
        const DEVICE_ID_KEY = 'deviceId';
        const DEBUG_COMMAND = "debugAbdullah113";
        let isDebugMode = false;

        // ---------- Scroll handling ----------
        let autoScroll = true;

        function isNearBottom() {
            return chatScroll.scrollHeight - chatScroll.scrollTop - chatScroll.clientHeight < 120;
        }

        function scrollToBottom(force = false) {
            if (force || autoScroll) {
                chatScroll.scrollTop = chatScroll.scrollHeight;
            }
        }

        chatScroll.addEventListener('scroll', () => {
            autoScroll = isNearBottom();
            scrollBottomBtn.classList.toggle('visible', !autoScroll);
        });

        scrollBottomBtn.addEventListener('click', () => {
            autoScroll = true;
            scrollToBottom(true);
        });

        // ---------- Device fingerprint ----------
        function getDeviceFingerprint() {
            if (localStorage.getItem(DEVICE_ID_KEY)) {
                return localStorage.getItem(DEVICE_ID_KEY);
            }
            const fingerprint = [
                navigator.userAgent,
                navigator.language,
                new Date().getTimezoneOffset(),
                screen.width,
                screen.height,
                screen.colorDepth,
                navigator.hardwareConcurrency,
                navigator.deviceMemory
            ].join('|');
            const deviceId = btoa(fingerprint) + Date.now().toString(36);
            localStorage.setItem(DEVICE_ID_KEY, deviceId);
            return deviceId;
        }

        // ---------- Request limit ----------
        function checkRequestLimit() {
            if (isDebugMode) {
                updateRequestCounter();
                return 0;
            }

            const now = Date.now();
            const resetTime = parseInt(localStorage.getItem(REQUEST_RESET_KEY) || '0');
            const currentCount = parseInt(localStorage.getItem(REQUEST_COUNT_KEY) || '0');

            if (now > resetTime) {
                localStorage.setItem(REQUEST_COUNT_KEY, '1');
                const nextReset = now + (24 * 60 * 60 * 1000);
                localStorage.setItem(REQUEST_RESET_KEY, nextReset.toString());
                updateRequestCounter();
                return 1;
            }

            if (currentCount >= DAILY_REQUEST_LIMIT) {
                const timeUntilReset = resetTime - now;
                const hoursUntilReset = Math.ceil(timeUntilReset / (1000 * 60 * 60));
                throw new Error(`Daily limit of ${DAILY_REQUEST_LIMIT} requests reached. Please try again in ${hoursUntilReset} hours.`);
            }

            const newCount = currentCount + 1;
            localStorage.setItem(REQUEST_COUNT_KEY, newCount.toString());
            updateRequestCounter();
            return newCount;
        }

        function updateRequestCounter() {
            const counter = document.getElementById('request-counter');

            if (isDebugMode) {
                counter.textContent = '∞ requests (Debug)';
                counter.style.background = 'rgba(255, 87, 34, 0.12)';
                counter.style.color = '#FF7043';
                return;
            }

            const currentCount = parseInt(localStorage.getItem(REQUEST_COUNT_KEY) || '0');
            const remaining = Math.max(0, DAILY_REQUEST_LIMIT - currentCount);
            counter.textContent = `${remaining} requests left`;

            if (remaining <= 5) {
                counter.style.background = 'rgba(255, 87, 34, 0.12)';
                counter.style.color = '#FF7043';
            } else {
                counter.style.background = 'rgba(16, 163, 127, 0.12)';
                counter.style.color = '#10a37f';
            }
        }

        function enableDebugMode(command) {
            if (command === DEBUG_COMMAND) {
                isDebugMode = true;
                updateRequestCounter();
                addMessage('Assistant', 'Debug mode enabled for this session. You now have unlimited requests.', false);
                return true;
            }
            return false;
        }

        // ---------- Cookies / preferences ----------
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        // ---------- Language toggle ----------
        function toggleLanguage() {
            isArabic = !isArabic;
            const testElement = document.querySelector('.test');
            const languageToggle = document.getElementById('languageToggle');

            if (isArabic) {
                document.body.classList.add('rtl');
                testElement.textContent = 'اختبار تجريبي: 0.8.0';
                userInput.setAttribute('placeholder', 'اطرح سؤالاً إسلامياً');
                languageToggle.textContent = 'English';
            } else {
                document.body.classList.remove('rtl');
                testElement.textContent = 'Beta 0.8.0';
                userInput.setAttribute('placeholder', 'Ask an Islamic question');
                languageToggle.textContent = 'عربي';
            }
        }

        document.getElementById('languageToggle').addEventListener('click', toggleLanguage);

        // ---------- Textarea autosize ----------
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
            updateSendButtonState();
        });

        function updateSendButtonState() {
            sendButton.disabled = !userInput.value.trim() && uploadedFiles.length === 0 && !quotedText;
        }

        // ---------- Highlight-to-ask ----------
        function setQuote(text) {
            quotedText = text;
            quoteBarText.textContent = text;
            quoteBar.hidden = false;
            updateSendButtonState();
        }

        function clearQuote() {
            quotedText = null;
            quoteBar.hidden = true;
            quoteBarText.textContent = '';
            updateSendButtonState();
        }

        removeQuoteBtn.addEventListener('click', clearQuote);

        function hideSelectionTooltip() {
            selectionTooltip.classList.remove('visible');
        }

        function getAssistantSelection() {
            const selection = window.getSelection();
            if (!selection || selection.isCollapsed) return null;
            const text = selection.toString().trim();
            if (text.length < 3) return null;
            // Selection must start inside an assistant message's text
            const anchorEl = selection.anchorNode && (selection.anchorNode.nodeType === 1 ? selection.anchorNode : selection.anchorNode.parentElement);
            if (!anchorEl || !anchorEl.closest('.assistant-message .message-text')) return null;
            return { selection, text };
        }

        function maybeShowSelectionTooltip() {
            const result = getAssistantSelection();
            if (!result) {
                hideSelectionTooltip();
                return;
            }
            const rect = result.selection.getRangeAt(0).getBoundingClientRect();
            const tipWidth = selectionTooltip.offsetWidth || 150;
            let left = rect.left + rect.width / 2 - tipWidth / 2;
            left = Math.max(10, Math.min(left, window.innerWidth - tipWidth - 10));
            let top = rect.top - 46;
            if (top < 60) top = rect.bottom + 10; // below selection if too close to header
            selectionTooltip.style.left = left + 'px';
            selectionTooltip.style.top = top + 'px';
            selectionTooltip.classList.add('visible');
        }

        document.addEventListener('mouseup', (e) => {
            if (e.target.closest('.selection-tooltip')) return;
            setTimeout(maybeShowSelectionTooltip, 10);
        });

        // Mobile: selection via long-press
        document.addEventListener('selectionchange', () => {
            clearTimeout(window.__selTimer);
            window.__selTimer = setTimeout(() => {
                if (getAssistantSelection()) maybeShowSelectionTooltip();
                else hideSelectionTooltip();
            }, 250);
        });

        chatScroll.addEventListener('scroll', hideSelectionTooltip);

        selectionTooltip.addEventListener('click', () => {
            const result = getAssistantSelection();
            if (result) {
                setQuote(result.text.slice(0, 800));
                window.getSelection().removeAllRanges();
            }
            hideSelectionTooltip();
            userInput.focus();
        });

        // ---------- Init ----------
        document.addEventListener('DOMContentLoaded', async function () {
            sendButton.disabled = true;
            updateRequestCounter();
            try {
                const response = await fetch('https://wisdompenai-0-01.onrender.com/start-conversation', {
                    method: 'POST'
                });
                if (!response.ok) throw new Error('Failed to start conversation');
                const data = await response.json();
                sessionId = data.sessionId;
                console.log('Conversation started with sessionId:', sessionId);
                addMessage('Assistant', 'Assalamu alaikum! How can I assist you today? You can also upload images or text files, and I\'ll analyze them for you.', false);
            } catch (error) {
                console.error('Error starting conversation:', error);
                addMessage('Assistant', 'Error: Unable to start conversation. Please refresh the page.', false);
            }
        });

        // ---------- Messages ----------
        function addMessage(sender, message, isUser = false) {
            const messageElement = document.createElement('li');
            messageElement.classList.add(isUser ? 'user-message' : 'assistant-message');

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';

            if (!isUser) {
                const label = document.createElement('div');
                label.className = 'sender-label';
                label.textContent = 'WisdomPen';
                messageElement.appendChild(label);
            }

            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';

            if (isUser) {
                if (quotedText) {
                    const quoteDiv = document.createElement('div');
                    quoteDiv.className = 'quoted-text';
                    quoteDiv.textContent = quotedText;
                    messageContent.appendChild(quoteDiv);
                }
                textDiv.textContent = message;
                if (uploadedFiles.length > 0) {
                    const filePreviewsDiv = document.createElement('div');
                    filePreviewsDiv.className = 'message-file-previews';

                    uploadedFiles.forEach(({ file }) => {
                        if (file.type.startsWith('image/')) {
                            const imgContainer = document.createElement('div');
                            imgContainer.className = 'message-image-container';
                            const img = document.createElement('img');
                            img.className = 'message-image-preview';
                            img.loading = 'lazy';
                            const reader = new FileReader();
                            reader.onload = function (e) {
                                img.src = e.target.result;
                            };
                            reader.readAsDataURL(file);
                            imgContainer.appendChild(img);
                            filePreviewsDiv.appendChild(imgContainer);
                        } else {
                            const fileInfo = document.createElement('div');
                            fileInfo.className = 'message-file-info';
                            fileInfo.innerHTML = `<span class="material-icons-round">description</span><span>${file.name}</span>`;
                            filePreviewsDiv.appendChild(fileInfo);
                        }
                    });

                    messageContent.appendChild(filePreviewsDiv);
                }
            } else {
                textDiv.innerHTML = message ? formatResponse(message) : '';
            }

            messageContent.appendChild(textDiv);
            messageElement.appendChild(messageContent);
            chatbox.appendChild(messageElement);
            scrollToBottom(true);
            return messageElement;
        }

        // ---------- Formatting: markdown + custom tags -> clean HTML ----------
        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function formatInline(text) {
            // Custom tags
            text = text.replace(/\|IMP\|([\s\S]*?)\|\/IMP\|/g, '<strong>$1</strong>');
            text = text.replace(/\|REF\|([\s\S]*?)\|\/REF\|/g, '<span class="reference">$1</span>');
            // Inline code
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            // Bold / italic
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
            text = text.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            text = text.replace(/(^|\s)_([^_\n]+)_(?=\s|$|[.,;:!?])/g, '$1<em>$2</em>');
            // Markdown links
            text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
            return text;
        }

        function formatResponse(text) {
            if (!text) return '';

            text = escapeHtml(text);

            // Custom subtitle tags become headings before block parsing
            text = text.replace(/\|SUB\|([\s\S]*?)\|\/SUB\|/g, '\n### $1\n');

            // --- Repair text where newlines were lost in transit ---
            // "...worldwide.## Core beliefs" -> put glued headings on their own line
            text = text.replace(/([^\n#])\s*(#{1,3} )/g, '$1\n\n$2');
            // Heading text that runs straight into a sentence: close the heading at
            // sentence-ending punctuation followed by a capital/list start
            text = text.replace(/^(#{1,3} [^\n]{3,80}?[.:])\s*(?=[A-Zآ-ي])/gm, '$1\n\n');
            // Glued list markers: "text.- item" or "text.1. item"
            text = text.replace(/([.!?؟])\s*([-*•] )/g, '$1\n$2');
            text = text.replace(/([.!?؟])\s*((?:\d{1,2})[.)] )(?=[A-Zآ-ي])/g, '$1\n$2');
            // Stray doubled periods from joined lines: "commands.." -> "commands."
            text = text.replace(/([.!?؟])\.(?=\s|$)/gm, '$1');

            const lines = text.split('\n');
            const html = [];
            let inUl = false, inOl = false, inQuote = false, paragraph = [];

            function closeLists() {
                if (inUl) { html.push('</ul>'); inUl = false; }
                if (inOl) { html.push('</ol>'); inOl = false; }
            }

            function closeQuote() {
                if (inQuote) { html.push('</blockquote>'); inQuote = false; }
            }

            function flushParagraph() {
                if (paragraph.length) {
                    const joined = paragraph.join(' ');
                    if (/^⟪?IMPORTANT⟫?:?/i.test(joined.trim())) {
                        html.push('<p class="important-paragraph">' + formatInline(joined.replace(/^⟪?IMPORTANT⟫?:?\s*/i, '')) + '</p>');
                    } else {
                        // Break long text walls into readable paragraphs
                        splitIntoParagraphs(joined).forEach(part => {
                            html.push('<p>' + formatInline(part) + '</p>');
                        });
                    }
                    paragraph = [];
                }
            }

            for (let raw of lines) {
                const line = raw.trim();

                // Blank line: end current block
                if (!line) {
                    flushParagraph();
                    closeLists();
                    closeQuote();
                    continue;
                }

                // Headings
                const heading = line.match(/^(#{1,3})\s+(.*)$/);
                if (heading) {
                    flushParagraph(); closeLists(); closeQuote();
                    const level = Math.min(heading[1].length + 1, 3); // h2 or h3
                    html.push(`<h${level}>` + formatInline(heading[2]) + `</h${level}>`);
                    continue;
                }

                // Horizontal rule
                if (/^(-{3,}|\*{3,})$/.test(line)) {
                    flushParagraph(); closeLists(); closeQuote();
                    html.push('<hr>');
                    continue;
                }

                // Blockquote
                if (/^&gt;\s?/.test(line)) {
                    flushParagraph(); closeLists();
                    if (!inQuote) { html.push('<blockquote>'); inQuote = true; }
                    html.push('<p>' + formatInline(line.replace(/^&gt;\s?/, '')) + '</p>');
                    continue;
                }

                // Unordered list
                const ulMatch = line.match(/^[-*•]\s+(.*)$/);
                if (ulMatch) {
                    flushParagraph(); closeQuote();
                    if (inOl) { html.push('</ol>'); inOl = false; }
                    if (!inUl) { html.push('<ul>'); inUl = true; }
                    html.push('<li>' + formatInline(ulMatch[1]) + '</li>');
                    continue;
                }

                // Ordered list
                const olMatch = line.match(/^(\d+)[.)]\s+(.*)$/);
                if (olMatch) {
                    flushParagraph(); closeQuote();
                    if (inUl) { html.push('</ul>'); inUl = false; }
                    if (!inOl) { html.push('<ol>'); inOl = true; }
                    html.push('<li>' + formatInline(olMatch[2]) + '</li>');
                    continue;
                }

                // Regular text: accumulate into paragraph
                closeLists();
                closeQuote();
                paragraph.push(line);
            }

            flushParagraph();
            closeLists();
            closeQuote();

            return html.join('\n');
        }

        // Split a long block of text into shorter paragraphs at sentence boundaries
        function splitIntoParagraphs(text, maxLen = 320) {
            if (text.length <= maxLen) return [text];

            // Split into sentences (supports English and Arabic punctuation)
            const sentences = text.match(/[^.!?؟…]+[.!?؟…]+["'”»)]*\s*|[^.!?؟…]+$/g);
            if (!sentences || sentences.length < 2) return [text];

            const paragraphs = [];
            let current = '';
            let count = 0;

            for (const sentence of sentences) {
                current += sentence;
                count++;
                // New paragraph after 2-3 sentences or when getting long
                if (current.length >= maxLen || count >= 3) {
                    paragraphs.push(current.trim());
                    current = '';
                    count = 0;
                }
            }
            if (current.trim()) paragraphs.push(current.trim());
            return paragraphs;
        }

        // ---------- Loading animation ----------
        function createLoadingAnimation() {
            const words = ['Thinking', 'Searching sources', 'Looking that up', 'Finding an answer'];
            const randomWord = words[Math.floor(Math.random() * words.length)];

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'wisdom-pen-loading';
            loadingDiv.innerHTML = `
                <div class="ink-drops">
                    <div class="ink-drop"></div>
                    <div class="ink-drop"></div>
                    <div class="ink-drop"></div>
                </div>
                <div class="loading-text">${randomWord}...</div>
            `;
            return loadingDiv;
        }

        // ---------- Sidebar ----------
        closeSidebar.addEventListener('click', () => sidebar.classList.remove('open'));

        // ---------- Send message ----------
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message && uploadedFiles.length === 0 && !quotedText) return;

            if (message === DEBUG_COMMAND) {
                enableDebugMode(message);
                userInput.value = '';
                userInput.style.height = 'auto';
                return;
            }

            try {
                checkRequestLimit();

                // Build the message actually sent to the AI (quote + question)
                let outgoingMessage = message;
                if (quotedText) {
                    outgoingMessage = `Regarding this part of your previous answer:\n"${quotedText}"\n\n${message || 'Please explain this part in more detail.'}`;
                }

                addMessage('You', message, true);
                clearQuote();

                userInput.value = '';
                userInput.style.height = 'auto';
                updateSendButtonState();
                userInput.disabled = true;
                sendButton.disabled = true;
                autoScroll = true;

                fileList.innerHTML = '';
                const assistantMessage = addMessage('Assistant', '', false);
                const textDiv = assistantMessage.querySelector('.message-text');

                const loadingAnimation = createLoadingAnimation();
                textDiv.appendChild(loadingAnimation);
                scrollToBottom(true);

                try {
                    const formData = new FormData();
                    formData.append('sessionId', sessionId);
                    if (outgoingMessage) formData.append('message', outgoingMessage);
                    fileContents.forEach(item => {
                        if (item.type === 'text') {
                            const blob = new Blob([item.content], { type: 'text/plain' });
                            formData.append('files', blob, item.name);
                        } else if (item.type === 'image') {
                            const originalFile = uploadedFiles.find(f => f.id === item.id);
                            if (originalFile) formData.append('files', originalFile.file, item.name);
                        }
                    });

                    const response = await fetch('https://wisdompenai-0-01.onrender.com/chat', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullResponse = '';
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        let boundary = buffer.indexOf('\n\n');

                        while (boundary !== -1) {
                            const rawEvent = buffer.substring(0, boundary);
                            buffer = buffer.substring(boundary + 2);

                            // SSE: newlines in the payload arrive as multiple "data:" lines
                            // in one event. Join them back with \n to preserve formatting.
                            const dataLines = rawEvent.split('\n').filter(l => l.startsWith('data:'));
                            if (dataLines.length > 0) {
                                const data = dataLines.map(l => l.replace(/^data: ?/, '')).join('\n');
                                if (data === '[END]') {
                                    loadingAnimation.remove();
                                    textDiv.innerHTML = formatResponse(fullResponse);
                                    scrollToBottom();
                                    uploadedFiles = [];
                                    fileContents = [];
                                    userInput.disabled = false;
                                    updateSendButtonState();
                                    userInput.focus();
                                    return;
                                } else {
                                    fullResponse += data;
                                    loadingAnimation.remove();
                                    textDiv.innerHTML = formatResponse(fullResponse);
                                    scrollToBottom();
                                }
                            }
                            boundary = buffer.indexOf('\n\n');
                        }
                    }
                } catch (error) {
                    console.error('Error:', error);
                    loadingAnimation.remove();
                    textDiv.innerHTML = `<p>An error occurred: ${escapeHtml(error.message)}</p>`;
                } finally {
                    uploadedFiles = [];
                    fileContents = [];
                    userInput.disabled = false;
                    updateSendButtonState();
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('Assistant', error.message, false);
            }
        }

        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ---------- File upload ----------
        fileUpload.addEventListener('change', function (e) {
            const files = e.target.files;
            if (files.length > 0) handleFiles(files);
            fileUpload.value = '';
        });

        overlaychat.addEventListener('click', function (e) {
            if (e.target === overlaychat) userInput.focus();
        });

        function handleFiles(files) {
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.type.startsWith('image/') || file.type === 'text/plain' || file.name.endsWith('.txt')) {
                    if (file.size <= 5 * 1024 * 1024) processFile(file);
                    else alert('File size exceeds 5MB limit.');
                } else {
                    alert('Only image and text files are supported.');
                }
            }
            setTimeout(() => userInput.focus(), 100);
        }

        function processFile(file) {
            const fileId = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            uploadedFiles.push({ id: fileId, file: file });
            addFileToUI(file, fileId);
            if (file.type === 'text/plain' || file.name.endsWith('.txt')) readTextFile(file, fileId);
            else if (file.type.startsWith('image/')) readImageFile(file, fileId);
        }

        function addFileToUI(file, fileId) {
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.setAttribute('data-file-id', fileId);
            const fileIcon = file.type.startsWith('image/') ? 'image' : 'description';

            const fileHeader = document.createElement('div');
            fileHeader.className = 'file-item-header';
            fileHeader.innerHTML = `
                <span class="material-icons-round">${fileIcon}</span>
                <span class="file-name">${file.name}</span>
                <span class="file-status">Loading...</span>
                <span class="material-icons-round remove-file" data-file-id="${fileId}">close</span>
            `;
            fileItem.appendChild(fileHeader);
            fileList.appendChild(fileItem);

            fileItem.querySelector('.remove-file').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                removeFile(fileId);
            });
        }

        function removeFile(fileId) {
            uploadedFiles = uploadedFiles.filter(item => item.id !== fileId);
            fileContents = fileContents.filter(item => item.id !== fileId);
            const fileItem = document.querySelector(`[data-file-id="${fileId}"]`);
            if (fileItem) fileItem.remove();
            updateSendButtonState();
        }

        function readTextFile(file, fileId) {
            const reader = new FileReader();
            reader.onload = function (e) {
                fileContents.push({ id: fileId, name: file.name, content: e.target.result, type: 'text' });
                updateFileStatus(fileId);
                updateSendButtonState();
            };
            reader.readAsText(file);
        }

        function readImageFile(file, fileId) {
            const reader = new FileReader();
            reader.onload = function (e) {
                fileContents.push({ id: fileId, name: file.name, content: '[Image data]', preview: e.target.result, type: 'image' });
                const fileItem = document.querySelector(`[data-file-id="${fileId}"]`);
                if (fileItem) {
                    const previewContainer = document.createElement('div');
                    previewContainer.className = 'file-preview-container';
                    const preview = document.createElement('img');
                    preview.src = e.target.result;
                    preview.className = 'file-preview';
                    previewContainer.appendChild(preview);
                    fileItem.appendChild(previewContainer);
                    updateFileStatus(fileId);
                    updateSendButtonState();
                }
            };
            reader.readAsDataURL(file);
        }

        function updateFileStatus(fileId) {
            const fileItem = document.querySelector(`[data-file-id="${fileId}"]`);
            if (fileItem) {
                const status = fileItem.querySelector('.file-status');
                if (status) {
                    status.textContent = 'Ready';
                    status.style.color = '#10a37f';
                }
            }
        }
    </script>
</body>

</html>
